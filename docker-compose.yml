services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: "MathBattles"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "123456"
    ports:
      - 5432:5432
    volumes:
      - .:/MathBattlesRepository
  mathbattlesserver:
    build: backend/DiplomaWebApp/
    depends_on:
      - db
    ports:
      - 32783:8080
